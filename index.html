<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Preet ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
text-align:center;
overflow-x:hidden;
}

header{
padding:40px 20px;
color:white;
}

header h1{
font-size:40px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

.message{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.gallery img{
width:100%;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

.love{
font-size:28px;
color:red;
font-weight:bold;
padding:20px;
}

.heart{
position:fixed;
top:-20px;
color:red;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}
</style>
</head>

<body>

<header>
<h1>🎂 Happy Birthday Preet ❤️</h1>
<p>The Most Beautiful Girl In My Life 💖</p>
</header>

<div class="message">
<h2>💌 From Dipanshu</h2>
<p>
29 June ko duniya ko ek bahut pyari ladki mili thi,
aur mujhe meri Preet mili ❤️
</p>
</div>

<div class="message">
<h2>🌹 Hamari Yaadein</h2>
<p>
Har photo ek yaad hai,
har yaad mere dil ke bahut kareeb hai. 💕
</p>
</div>

<div class="gallery">

<img src="Screenshot_20260612_180642_Instagram.jpg">

<img src="Screenshot_20260612_182219_Instagram.jpg">

<img src="Screenshot_20260612_182228_Instagram.jpg">

<img src="Screenshot_20260612_182242_Instagram.jpg">

<img src="Screenshot_20260612_182305_Instagram.jpg">

<img src="Screenshot_20260612_183608_Gallery.jpg">

</div>

<div class="love">
❤️ I Love You Preet ❤️
</div>

<script>
for(let i=0;i<40;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*5)+"s";
heart.style.opacity=Math.random();
document.body.appendChild(heart);
}
</script>

</body>
</html>
